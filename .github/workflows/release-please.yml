name: Release Please

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    name: tag · changelog · github release
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: release
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
          # Tag and publish a GitHub Release directly on push to `release`
          # (no intermediate Release PR). Conventional commits since the last
          # tag drive the semver bump; package.json, CHANGELOG.md, and the
          # manifest are updated in a follow-up commit on the same branch.
          skip-github-pull-request: true

      - name: Summarize release
        if: ${{ steps.release.outputs.release_created }}
        run: |
          echo "Created release **${{ steps.release.outputs.tag_name }}**" >> "$GITHUB_STEP_SUMMARY"
